version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: erp-frontend-playground-dev
    
    ports:
      - "3000:3000"
    
    volumes:
      - .:/app
      
      - /app/node_modules
      - /app/.next
      
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

    tty: true
    stdin_open: true
